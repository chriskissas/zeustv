<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>tioumpa.org</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Inter',sans-serif;
    background:#0b1622;
    color:#e6edf3;
}

/* HEADER */
.header {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 20px;
    border-bottom:1px solid #1f3a52;
    cursor:pointer;
}

/* LAYOUT */
.app {
    display:flex;
    height:calc(100vh - 60px);
}

.sidebar {
    width:320px;
    border-right:1px solid #1f3a52;
    overflow:auto;
    padding:15px;
}

.content {
    flex:1;
    padding:30px;
    overflow:auto;
}

/* SEARCH */
.search-wrapper {
    position:relative;
    display:flex;
    justify-content:center;
    margin-top:20px;
}

.search-wrapper input {
    width:60%;
    padding:12px 40px;
    border-radius:12px;
    border:none;
    background:#12263a;
    color:white;
    font-family:Helvetica, Arial;
    transition:0.3s;
}

.search-wrapper input:focus {
    width:65%;
}

.search-icon {
    position:absolute;
    left:calc(20% + 10px);
    top:50%;
    transform:translateY(-50%);
    width:16px;
    filter:invert(1);
}

/* WORD */
.word {
    padding:10px;
    cursor:pointer;
}
.word:hover { background:#1b344a; }

/* LETTER */
.letter {
    margin-top:15px;
    font-weight:600;
    border-bottom:1px solid #2a445c;
}

/* HOME */
.home {
    text-align:center;
    margin-top:40px;
}

.bubbles {
    margin-top:20px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
}

.bubble {
    padding:8px 12px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    animation:move 6s forwards;
}

@keyframes move {
    0%{transform:translate(0,0);}
    50%{transform:translate(20px,-10px);}
    100%{opacity:0;}
}

/* ENTRY */
.entry-title {
    font-size:30px;
    font-style:italic;
}

.entry-divider {
    height:1px;
    background:#2a445c;
    margin:10px 0;
}

/* FAVORITE */
.star {
    cursor:pointer;
    font-size:20px;
}
</style>
</head>

<body>

<div class="header" onclick="goHome()">
<img src="https://i.ibb.co/ZRJ23fvR/kranoumpanoumpanoumpa.png" height="40">
<strong>tioumpa.org</strong>
</div>

<div class="app">

<div class="sidebar">
<div id="list"></div>
</div>

<div class="content" id="content"></div>

</div>

<script>

let entries=[];
let clicks=JSON.parse(localStorage.getItem("clicks")||"{}");
let favorites=JSON.parse(localStorage.getItem("favorites")||"[]");

fetch("data.txt")
.then(r=>r.text())
.then(text=>{
    entries = text.split(/\n(?=Ατάκα)/g).map(e=>{
        const title = e.split("\n")[0].replace(/Ατάκα[0-9]+:\s*/,"").trim();
        return {title,full:e};
    });

    renderList();
    showHome();
});

/* HOME */
function showHome(){

    let trending = Object.entries(clicks)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,5)
        .map(e=>`<div>${e[0]}</div>`).join("");

    document.getElementById("content").innerHTML = `
        <div class="home">
            <img src="https://i.ibb.co/ZRJ23fvR/kranoumpanoumpanoumpa.png" width="150">
            <h2>tioumpa.org</h2>

            <div class="search-wrapper">
                <img class="search-icon" src="https://uxwing.com/wp-content/themes/uxwing/download/user-interface/search-icon.png">
                <input id="searchMain" placeholder="Αναζήτηση...">
            </div>

            <h3>🔥 Trending</h3>
            ${trending}

            <h3>⭐ Favorites</h3>
            ${favorites.map(f=>`<div>${f}</div>`).join("")}

            <div class="bubbles" id="bubbles"></div>
        </div>
    `;

    document.getElementById("searchMain").addEventListener("input",e=>{
        filter(e.target.value);
    });
}

/* LIST */
function renderList(){
    let sorted=[...entries].sort((a,b)=>a.title.localeCompare(b.title,'el'));

    const list=document.getElementById("list");
    list.innerHTML="";

    let current="";

    sorted.forEach(item=>{
        let l=item.title[0].toUpperCase();

        if(l!==current){
            current=l;
            let div=document.createElement("div");
            div.className="letter";
            div.innerText=l;
            list.appendChild(div);
        }

        let w=document.createElement("div");
        w.className="word";
        w.innerText=item.title;
        w.onclick=()=>location.hash=item.title;

        list.appendChild(w);
    });
}

/* ROUTER */
window.addEventListener("hashchange",route);

function route(){
    let name=decodeURIComponent(location.hash.replace("#",""));
    if(!name) return showHome();

    let entry=entries.find(e=>e.title===name);
    if(entry) openEntry(entry);
}

/* ENTRY */
function openEntry(entry){

    clicks[entry.title]=(clicks[entry.title]||0)+1;
    localStorage.setItem("clicks",JSON.stringify(clicks));

    let isFav = favorites.includes(entry.title);

    let lines=entry.full.split("\n");
    lines.shift();

    let clean=lines.join("\n").replace("Περιγραφή:","");

    document.getElementById("content").innerHTML=`
        <div class="entry-title">
            ${entry.title}
            <span class="star" onclick="toggleFav('${entry.title}')">
                ${isFav?"⭐":"☆"}
            </span>
        </div>

        <div class="entry-divider"></div>
        <div>${clean}</div>
    `;
}

/* FAVORITES */
function toggleFav(word){
    if(favorites.includes(word)){
        favorites=favorites.filter(f=>f!==word);
    } else {
        favorites.push(word);
    }
    localStorage.setItem("favorites",JSON.stringify(favorites));
    route();
}

/* FILTER */
function filter(q){
    q=q.toLowerCase();
    document.querySelectorAll(".word").forEach(el=>{
        el.style.display = el.innerText.toLowerCase().includes(q) ? "block":"none";
    });
}

/* BACK */
function goHome(){
    location.hash="";
    showHome();
}

</script>

</body>
</html>
