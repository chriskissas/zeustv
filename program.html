<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>tioumpa.gr</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Inter;
    background: #0b1622;
    color: white;
}

.container {
    max-width: 900px;
    margin: 50px auto;
    text-align: center;
}

.title {
    font-size: 40px;
}

.logo img {
    width: 130px;
    margin-top: 10px;
}

.word {
    padding: 12px;
    border-bottom: 1px solid #1f3a52;
    cursor: pointer;
    text-align:left;
}

.word:hover {
    background:#1b344a;
}

/* MODAL */
.modal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

.modal.active {
    opacity:1;
    pointer-events:all;
}

.modal-box {
    background:#0f1c2a;
    padding:30px;
    width:700px;
    max-height:80vh;
    overflow:auto;
    border-radius:10px;
}

iframe {
    width:100%;
    margin-top:10px;
}

.close {
    float:right;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<div class="title">tioumpa.gr</div>

<div class="logo">
<img src="https://i.ibb.co/ZRJ23fvR/kranoumpanoumpanoumpa.png">
</div>

<div id="list"></div>
</div>

<div class="modal" id="modal">
<div class="modal-box">
<span class="close" onclick="closeModal()">✖</span>
<div id="content"></div>
</div>
</div>

<script>

fetch("data.txt")
.then(r=>r.text())
.then(text=>{

    // ΚΡΑΤΑΜΕ ΟΛΟ ΤΟ BLOCK ΑΚΡΙΒΩΣ
    const entries = text.split(/\n(?=Ατάκα)/g);

    const list = document.getElementById("list");

    entries.forEach(e=>{
        const title = e.split("\n")[0].replace(/Ατάκα[0-9]+:\s*/,"");

        let div=document.createElement("div");
        div.className="word";
        div.innerText=title;

        div.onclick=()=>{
            document.getElementById("modal").classList.add("active");
            document.getElementById("content").innerHTML = `
                <pre style="white-space: pre-wrap; font-family: Inter;">${e}</pre>
            `;
        };

        list.appendChild(div);
    });

});

function closeModal(){
    document.getElementById("modal").classList.remove("active");
}

</script>

</body>
</html>
