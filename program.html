<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<title>tioumpa.gr</title>

<style>
body {
    margin:0;
    font-family:'Inter',sans-serif;
    background:#0b1622;
    color:#e6edf3;
}

/* HEADER */
.header {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 20px;
    border-bottom:1px solid #1f3a52;
    cursor:pointer;
}

/* LAYOUT */
.app {
    display:flex;
    height:calc(100vh - 60px);
}

.sidebar {
    width:320px; /* πιο μεγάλο */
    border-right:1px solid #1f3a52;
    overflow:auto;
    padding:15px;
}

.content {
    flex:1;
    padding:30px;
    overflow:auto;
}

/* LETTER */
.letter {
    margin-top:15px;
    font-weight:600;
    border-bottom:1px solid #2a445c;
}

/* WORD */
.word {
    padding:10px;
    cursor:pointer;
}

.word:hover {
    background:#1b344a;
}

/* HOME */
.home {
    text-align:center;
    margin-top:40px;
}

.home img {
    width:180px;
}

/* TITLE TEXT */
.subtitle {
    margin-top:10px;
    font-size:14px;
    color:#8aa4bf;
}

/* SEARCH */
.search-box {
    margin-top:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

.search-box input {
    width:60%;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#12263a;
    color:white;
}

.search-icon {
    width:20px;
    filter:invert(1);
}

/* BUBBLES */
.bubbles {
    margin-top:30px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.bubble {
    padding:10px 15px;
    border-radius:20px;
    backdrop-filter: blur(10px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    animation:fade 6s forwards;
}

@keyframes fade {
    0%{opacity:0; transform:scale(0.8);}
    20%{opacity:1;}
    80%{opacity:1;}
    100%{opacity:0; transform:scale(1.1);}
}

/* ENTRY */
.entry-title {
    font-size:30px;
    font-style:italic;
    animation:slide 0.4s ease;
}

.entry-divider {
    margin:10px 0;
    height:1px;
    background:#2a445c;
}

.entry-body {
    margin-top:10px;
    white-space:pre-wrap;
    animation:slide 0.5s ease;
}

iframe {
    margin-top:20px;
    width:100%;
}

@keyframes slide {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

/* MOBILE */
@media(max-width:800px){
    .app {flex-direction:column;}
    .sidebar {width:100%; height:200px;}
}
</style>
</head>

<body>

<div class="header" onclick="goHome()">
<img src="https://i.ibb.co/ZRJ23fvR/kranoumpanoumpanoumpa.png" height="40">
<strong>tioumpa.gr</strong>
</div>

<div class="app">

<div class="sidebar">
<div id="list"></div>
</div>

<div class="content" id="content"></div>

</div>

<script>

let entries=[];

fetch("data.txt")
.then(r=>r.text())
.then(text=>{
    entries = text.split(/\n(?=Ατάκα)/g).map(e=>{
        const title = e.split("\n")[0].replace(/Ατάκα[0-9]+:\s*/,"").trim();
        return {title,full:e};
    });

    renderList();
    showHome();
    bubbleLoop();
});

/* CLEAN LETTER */
function getLetter(str){
    return str.replace(/[^Α-Ωα-ωA-Za-z]/g,"").charAt(0).toUpperCase();
}

/* LIST */
function renderList(){
    let sorted=[...entries].sort((a,b)=>a.title.localeCompare(b.title,'el'));

    const list=document.getElementById("list");
    list.innerHTML="";

    let current="";

    sorted.forEach(item=>{
        let l=getLetter(item.title);

        if(l!==current){
            current=l;
            let div=document.createElement("div");
            div.className="letter";
            div.innerText=l;
            list.appendChild(div);
        }

        let w=document.createElement("div");
        w.className="word";
        w.innerText=item.title;
        w.onclick=()=>openEntry(item);

        list.appendChild(w);
    });
}

/* HOME */
function showHome(){
    document.getElementById("content").innerHTML = `
        <div class="home">
            <img src="https://i.ibb.co/ZRJ23fvR/kranoumpanoumpanoumpa.png">
            <h2>tioumpa.gr</h2>
            <div class="subtitle">ΤΟ ΛΕΞΙΚΟ ΤΟΥ TEOSTY</div>

            <div class="search-box">
                <img class="search-icon" src="https://uxwing.com/wp-content/themes/uxwing/download/user-interface/search-icon.png">
                <input id="searchMain" placeholder="Αναζήτηση...">
            </div>

            <div class="bubbles" id="bubbles"></div>
        </div>
    `;

    document.getElementById("searchMain").addEventListener("input", e=>{
        filterList(e.target.value);
    });
}

/* FILTER */
function filterList(q){
    q=q.toLowerCase();
    document.querySelectorAll(".word").forEach(el=>{
        el.style.display = el.innerText.toLowerCase().includes(q) ? "block":"none";
    });
}

/* BUBBLES FIXED */
function bubbleLoop(){
    setInterval(()=>{
        const container=document.getElementById("bubbles");
        if(!container) return;

        container.innerHTML="";

        let used=[];

        for(let i=0;i<6;i++){
            let word;
            do{
                word=entries[Math.floor(Math.random()*entries.length)].title;
            } while(used.includes(word));

            used.push(word);

            let div=document.createElement("div");
            div.className="bubble";
            div.innerText=word;

            container.appendChild(div);
        }

    },6000);
}

/* ENTRY */
function openEntry(entry){

    let lines = entry.full.split("\n");
    lines.shift();

    let clean = lines.join("\n").replace("Περιγραφή:", "");

    document.getElementById("content").innerHTML = `
        <div class="entry-title">${entry.title}</div>
        <div class="entry-divider"></div>
        <div class="entry-body">${clean}</div>
    `;
}

/* BACK */
function goHome(){
    showHome();
}

</script>

</body>
</html>
