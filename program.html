<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tioumpa.gr</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Inter',sans-serif;
    background:#0b1622;
    color:#e6edf3;
}

/* HEADER */
.header {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 20px;
    border-bottom:1px solid #1f3a52;
    cursor:pointer;
}

.header img {
    height:40px;
}

/* LAYOUT */
.app {
    display:flex;
    height:calc(100vh - 60px);
}

.sidebar {
    width:260px;
    border-right:1px solid #1f3a52;
    overflow:auto;
    padding:10px;
}

.content {
    flex:1;
    padding:20px;
    overflow:auto;
}

/* SEARCH MAIN */
.main-search {
    text-align:center;
    margin-top:20px;
}

.main-search input {
    width:60%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#12263a;
    color:white;
}

/* WORD */
.word {
    padding:8px;
    cursor:pointer;
}

.word:hover {
    background:#1b344a;
}

/* LETTER */
.letter {
    margin-top:10px;
    font-weight:bold;
    border-bottom:1px solid #2a445c;
}

/* HOME */
.home {
    text-align:center;
    margin-top:40px;
}

.home img {
    width:160px;
}

/* BUBBLES */
.bubbles {
    position:relative;
    height:120px;
    margin-top:20px;
}

.bubble {
    position:absolute;
    padding:8px 12px;
    background:#1b344a;
    border-radius:20px;
    animation:pop 6s forwards;
}

@keyframes pop {
    0% {opacity:0; transform:scale(0.5);}
    20% {opacity:1;}
    80% {opacity:1;}
    100% {opacity:0; transform:scale(1.2);}
}

/* ENTRY */
.entry-title {
    font-size:28px;
    font-style:italic;
}

.entry-body {
    margin-top:10px;
    white-space:pre-wrap;
}

/* MOBILE */
@media(max-width:800px){
    .app { flex-direction:column; }
    .sidebar { width:100%; height:200px; }
}
</style>
</head>

<body>

<div class="header" onclick="goHome()">
<img src="https://i.ibb.co/ZRJ23fvR/kranoumpanoumpanoumpa.png">
<strong>tioumpa.gr</strong>
</div>

<div class="app">

<div class="sidebar">
<div id="list"></div>
</div>

<div class="content" id="content"></div>

</div>

<script>

let entries=[];

fetch("data.txt")
.then(r=>r.text())
.then(text=>{
    entries = text.split(/\n(?=Ατάκα)/g).map(e=>{
        const rawTitle = e.split("\n")[0].replace(/Ατάκα[0-9]+:\s*/,"").trim();
        return {title:rawTitle,full:e};
    });

    renderList();
    showHome();
    startBubbles();
});

/* CLEAN LETTER (ignore quotes etc) */
function getFirstLetter(str){
    let clean = str.replace(/[^Α-Ωα-ωA-Za-z]/g,"");
    return clean.charAt(0).toUpperCase();
}

/* LIST */
function renderList(){
    let sorted=[...entries].sort((a,b)=>a.title.localeCompare(b.title,'el'));

    const list=document.getElementById("list");
    list.innerHTML="";

    let currentLetter="";

    sorted.forEach(item=>{
        let letter=getFirstLetter(item.title);

        if(letter!==currentLetter){
            currentLetter=letter;
            let l=document.createElement("div");
            l.className="letter";
            l.innerText=letter;
            list.appendChild(l);
        }

        let div=document.createElement("div");
        div.className="word";
        div.innerText=item.title;
        div.onclick=()=>openEntry(item);

        list.appendChild(div);
    });
}

/* HOME */
function showHome(){
    document.getElementById("content").innerHTML = `
        <div class="home">
            <img src="https://i.ibb.co/ZRJ23fvR/kranoumpanoumpanoumpa.png">

            <div class="main-search">
                <input id="searchMain" placeholder="Αναζήτηση...">
            </div>

            <div class="bubbles" id="bubbles"></div>
        </div>
    `;

    document.getElementById("searchMain").addEventListener("input", e=>{
        filterList(e.target.value);
    });
}

/* FILTER */
function filterList(q){
    q=q.toLowerCase();
    const list=document.getElementById("list");

    list.querySelectorAll(".word").forEach(el=>{
        el.style.display = el.innerText.toLowerCase().includes(q) ? "block":"none";
    });
}

/* BUBBLES */
function startBubbles(){
    setInterval(()=>{
        const container=document.getElementById("bubbles");
        if(!container) return;

        container.innerHTML="";

        for(let i=0;i<5;i++){
            let word=entries[Math.floor(Math.random()*entries.length)].title;

            let div=document.createElement("div");
            div.className="bubble";
            div.innerText=word;

            div.style.left=Math.random()*80+"%";
            div.style.top=Math.random()*60+"%";

            container.appendChild(div);
        }

    },6000);
}

/* ENTRY */
function openEntry(entry){

    let lines = entry.full.split("\n");
    lines.shift();

    let clean = lines.join("\n").replace("Περιγραφή:", "");

    document.getElementById("content").innerHTML = `
        <div class="entry-title">${entry.title}</div>
        <div class="entry-body">${clean}</div>
    `;
}

/* BACK */
function goHome(){
    showHome();
}

</script>

</body>
</html>
