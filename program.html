<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>tioumpa.gr</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Inter',sans-serif;
    background: linear-gradient(-45deg,#0b1622,#0f1f2f,#12263a,#0b1622);
    background-size:400% 400%;
    animation:bg 18s ease infinite;
    color:#e6edf3;
}

@keyframes bg {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container {
    max-width:900px;
    margin:40px auto;
}

.title {
    text-align:center;
    font-size:42px;
    font-weight:600;
}

.logo {
    text-align:center;
}

.logo img {
    width:120px;
    margin-top:10px;
}

.search {
    text-align:center;
    margin:20px 0;
}

input {
    width:60%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#12263a;
    color:white;
}

/* LETTER */
.letter {
    margin-top:25px;
    font-size:20px;
    border-bottom:1px solid #2a445c;
}

/* WORD */
.word {
    padding:10px;
    border-bottom:1px solid #1f3a52;
    cursor:pointer;
}

.word:hover {
    background:#1b344a;
    padding-left:15px;
}

/* SIDEBAR */
.sidebar {
    position:fixed;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:5px;
}

.sidebar div {
    cursor:pointer;
    font-size:14px;
    opacity:0.6;
}

.sidebar div:hover {
    opacity:1;
}

/* MODAL */
.modal {
    position:fixed;
    inset:0;
    backdrop-filter: blur(6px);
    background:rgba(0,0,0,0.6);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
}

.modal.active {
    opacity:1;
    pointer-events:all;
}

.modal-box {
    background:rgba(15,28,42,0.95);
    padding:30px;
    width:700px;
    border-radius:14px;
    max-height:80vh;
    overflow:auto;
    transform:scale(0.9);
    transition:0.3s;
    font-family:'Inter',sans-serif;
    font-size:16px;
    line-height:1.6;
}

.modal.active .modal-box {
    transform:scale(1);
}

.close {
    float:right;
    cursor:pointer;
}

.modal h2 {
    font-size:24px;
    font-weight:600;
    margin-bottom:10px;
}

iframe {
    width:100%;
    margin-top:15px;
}

/* FOOTER */
.footer {
    text-align:center;
    margin:40px 0;
    font-size:13px;
    color:#8aa4bf;
}
</style>
</head>

<body>

<div class="container">

<div class="title">tioumpa.gr</div>

<div class="logo">
<img src="https://i.ibb.co/ZRJ23fvR/kranoumpanoumpanoumpa.png">
</div>

<div class="search">
<input id="search" placeholder="Αναζήτηση...">
</div>

<div id="list"></div>

<div class="footer">
Αν θέλετε να επικοινωνήσετε μαζί μας για οποιαδήποτε αλλαγή ή προσθήκη στείλτε μας μήνυμα στο: tioumpa@gmail.com
</div>

</div>

<div class="sidebar" id="sidebar"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<span class="close" onclick="closeModal()">✖</span>
<div id="content"></div>
</div>
</div>

<script>

let entries=[];

fetch("data.txt")
.then(r=>r.text())
.then(text=>{
    entries = text.split(/\n(?=Ατάκα)/g).map(e=>{
        const title = e.split("\n")[0].replace(/Ατάκα[0-9]+:\s*/,"").trim();
        return {title,full:e};
    });

    render();
    buildSidebar();
});

function render(){
    const search=document.getElementById("search").value.toLowerCase();
    let filtered = entries.filter(e=>e.title.toLowerCase().includes(search));

    filtered.sort((a,b)=>a.title.localeCompare(b.title,'el'));

    const list=document.getElementById("list");
    list.innerHTML="";

    let currentLetter="";

    filtered.forEach(item=>{
        let letter=item.title[0].toUpperCase();

        if(letter!==currentLetter){
            currentLetter=letter;
            let l=document.createElement("div");
            l.className="letter";
            l.id="letter-"+letter;
            l.innerText=letter;
            list.appendChild(l);
        }

        let div=document.createElement("div");
        div.className="word";
        div.innerText=item.title;

        div.onclick=()=>{

            document.getElementById("modal").classList.add("active");

            let lines = item.full.split("\n");
            lines.shift(); // αφαιρεί ΑτάκαΧ:

            let clean = lines.join("\n");
            clean = clean.replace("Περιγραφή:", "");

            document.getElementById("content").innerHTML=`
                <h2>${item.title}</h2>
                <div style="white-space: pre-wrap;">${clean}</div>
            `;
        };

        list.appendChild(div);
    });
}

function buildSidebar(){
    const letters=[...new Set(entries.map(e=>e.title[0].toUpperCase()))];
    const sb=document.getElementById("sidebar");

    letters.forEach(l=>{
        let div=document.createElement("div");
        div.innerText=l;
        div.onclick=()=>{
            const el=document.getElementById("letter-"+l);
            if(el) el.scrollIntoView({behavior:"smooth"});
        };
        sb.appendChild(div);
    });
}

document.getElementById("search").addEventListener("input",render);

function closeModal(){
    document.getElementById("modal").classList.remove("active");
}

</script>

</body>
</html>
