<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>tioumpa.gr</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Inter',sans-serif;
    background:#0b1622;
    color:#e6edf3;
}

/* LAYOUT */
.app {
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar {
    width:280px;
    background:#0f1f2f;
    border-right:1px solid #1f3a52;
    overflow:auto;
    padding:15px;
}

.search input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    background:#12263a;
    color:white;
}

.word {
    padding:8px;
    cursor:pointer;
}

.word:hover {
    background:#1b344a;
}

/* CONTENT */
.content {
    flex:1;
    padding:40px;
    overflow:auto;
}

/* ENTRY */
.entry-title {
    font-size:32px;
    font-style:italic; /* 👈 όπως ζήτησες */
    font-weight:400;
    margin-bottom:20px;
    animation:fadeIn 0.4s ease;
}

.entry-body {
    white-space:pre-wrap;
    line-height:1.7;
    font-size:16px;
    animation:fadeIn 0.4s ease;
}

/* ANIMATIONS */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

/* HOME */
.home {
    text-align:center;
    margin-top:80px;
}

/* PUZZLE LOGO */
.puzzle {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin-top:20px;
}

.tile {
    width:60px;
    height:60px;
    background:#12263a;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    border-radius:8px;
    animation:float 3s infinite ease-in-out;
}

.tile:nth-child(odd){ animation-delay:0.3s; }

@keyframes float {
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-10px); }
}

/* TABLE */
table {
    margin-top:15px;
    border-collapse: collapse;
    width:100%;
}

td, th {
    border:1px solid #2a445c;
    padding:6px;
    text-align:center;
}

/* FOOTER */
.footer {
    text-align:center;
    margin-top:40px;
    font-size:13px;
    color:#8aa4bf;
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<h2>tioumpa.gr</h2>

<div class="search">
<input id="search" placeholder="Αναζήτηση...">
</div>

<div id="list"></div>

</div>

<!-- CONTENT -->
<div class="content" id="content"></div>

</div>

<script>

let entries=[];

fetch("data.txt")
.then(r=>r.text())
.then(text=>{
    entries = text.split(/\n(?=Ατάκα)/g).map(e=>{
        const title = e.split("\n")[0].replace(/Ατάκα[0-9]+:\s*/,"").trim();
        return {title,full:e};
    });

    renderList();
    showHome();
});

/* HOME */
function showHome(){
    document.getElementById("content").innerHTML = `
        <div class="home">
            <h1>tioumpa.gr</h1>
            <div class="puzzle">
                ${"Τιουμπagr".split("").map(l=>`<div class="tile">${l}</div>`).join("")}
            </div>
        </div>
    `;
}

/* LIST */
function renderList(){
    const list=document.getElementById("list");
    const search=document.getElementById("search").value.toLowerCase();

    list.innerHTML="";

    entries
    .filter(e=>e.title.toLowerCase().includes(search))
    .sort((a,b)=>a.title.localeCompare(b.title,'el'))
    .forEach(item=>{
        let div=document.createElement("div");
        div.className="word";
        div.innerText=item.title;

        div.onclick=()=>openEntry(item);

        list.appendChild(div);
    });
}

document.getElementById("search").addEventListener("input",renderList);

/* ENTRY */
function openEntry(entry){

    let lines = entry.full.split("\n");
    lines.shift();

    let clean = lines.join("\n").replace("Περιγραφή:", "");

    // 🔥 AUTO TABLE (basic detection)
    let tableHTML = "";

    if(clean.toLowerCase().includes("ουσιαστικό")){
        tableHTML = `
        <table>
        <tr><th></th><th>Ενικός</th><th>Πληθυντικός</th></tr>
        <tr><td>Ονομαστική</td><td>-</td><td>-</td></tr>
        <tr><td>Γενική</td><td>-</td><td>-</td></tr>
        <tr><td>Αιτιατική</td><td>-</td><td>-</td></tr>
        <tr><td>Κλητική</td><td>-</td><td>-</td></tr>
        </table>
        `;
    }

    document.getElementById("content").innerHTML = `
        <div class="entry-title">${entry.title}</div>
        <div class="entry-body">${clean}</div>
        ${tableHTML}
        <div class="footer">
        Αν θέλετε να επικοινωνήσετε μαζί μας για οποιαδήποτε αλλαγή και πρόσθεση στείλτε μας μήνυμα στο: tioumpa@gmail.com
        </div>
    `;
}

</script>

</body>
</html>
