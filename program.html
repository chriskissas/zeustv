<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tioumpa.gr</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Inter',sans-serif;
    background:#0b1622;
    color:#e6edf3;
}

/* HEADER */
.header {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 20px;
    border-bottom:1px solid #1f3a52;
    cursor:pointer;
}

.header img {
    height:40px;
    animation:float 3s infinite;
}

@keyframes float {
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-5px);}
}

/* LAYOUT */
.app {
    display:flex;
    height:calc(100vh - 60px);
}

.sidebar {
    width:260px;
    border-right:1px solid #1f3a52;
    overflow:auto;
    padding:10px;
}

.content {
    flex:1;
    padding:20px;
    overflow:auto;
}

/* SEARCH */
.search {
    display:flex;
    gap:5px;
}

.search input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#12263a;
    color:white;
}

.search button {
    padding:10px;
    border:none;
    border-radius:8px;
    background:#1b344a;
    color:white;
}

/* WORD */
.word {
    padding:8px;
    cursor:pointer;
}

.word:hover {
    background:#1b344a;
}

/* LETTER */
.letter {
    margin-top:10px;
    font-weight:bold;
    border-bottom:1px solid #2a445c;
}

/* HOME */
.home {
    text-align:center;
    margin-top:50px;
}

.home img {
    width:180px;
    animation:pulse 2s infinite;
}

@keyframes pulse {
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
}

.random {
    margin-top:20px;
    font-size:20px;
    color:#58a6ff;
    animation:fade 1s;
}

@keyframes fade {
    from{opacity:0;}
    to{opacity:1;}
}

/* ENTRY */
.entry-title {
    font-size:28px;
    font-style:italic;
}

.entry-body {
    margin-top:10px;
    white-space:pre-wrap;
}

/* MOBILE */
@media(max-width:800px){
    .app {
        flex-direction:column;
    }

    .sidebar {
        width:100%;
        height:200px;
    }
}
</style>
</head>

<body>

<div class="header" onclick="goHome()">
<img src="https://i.ibb.co/ZRJ23fvR/kranoumpanoumpanoumpa.png">
<strong>tioumpa.gr</strong>
</div>

<div class="app">

<div class="sidebar">

<div class="search">
<input id="search" placeholder="Αναζήτηση...">
<button onclick="voiceSearch()">🎤</button>
</div>

<div id="list"></div>

</div>

<div class="content" id="content"></div>

</div>

<script>

let entries=[];

fetch("data.txt")
.then(r=>r.text())
.then(text=>{
    entries = text.split(/\n(?=Ατάκα)/g).map(e=>{
        const title = e.split("\n")[0].replace(/Ατάκα[0-9]+:\s*/,"").trim();
        return {title,full:e};
    });

    renderList();
    showHome();
    randomWordLoop();
});

/* HOME */
function showHome(){
    document.getElementById("content").innerHTML = `
        <div class="home">
            <img src="https://i.ibb.co/ZRJ23fvR/kranoumpanoumpanoumpa.png">
            <div class="random" id="randomWord"></div>
        </div>
    `;
}

/* RANDOM WORD */
function randomWordLoop(){
    setInterval(()=>{
        if(!entries.length) return;
        const w = entries[Math.floor(Math.random()*entries.length)].title;
        const el = document.getElementById("randomWord");
        if(el){
            el.innerText = w;
        }
    },2000);
}

/* LIST */
function renderList(){
    const search=document.getElementById("search").value.toLowerCase();
    let filtered = entries.filter(e=>e.title.toLowerCase().includes(search));

    filtered.sort((a,b)=>a.title.localeCompare(b.title,'el'));

    const list=document.getElementById("list");
    list.innerHTML="";

    let currentLetter="";

    filtered.forEach(item=>{
        let letter=item.title[0].toUpperCase();

        if(letter!==currentLetter){
            currentLetter=letter;
            let l=document.createElement("div");
            l.className="letter";
            l.innerText=letter;
            list.appendChild(l);
        }

        let div=document.createElement("div");
        div.className="word";
        div.innerText=item.title;

        div.onclick=()=>openEntry(item);

        list.appendChild(div);
    });
}

/* ENTRY */
function openEntry(entry){

    let lines = entry.full.split("\n");
    lines.shift();

    let clean = lines.join("\n").replace("Περιγραφή:", "");

    document.getElementById("content").innerHTML = `
        <div class="entry-title">${entry.title}</div>
        <div class="entry-body">${clean}</div>
    `;
}

/* BACK */
function goHome(){
    showHome();
}

/* VOICE SEARCH */
function voiceSearch(){
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "el-GR";

    recognition.onresult = function(event){
        document.getElementById("search").value = event.results[0][0].transcript;
        renderList();
    };

    recognition.start();
}

document.getElementById("search").addEventListener("input",renderList);

</script>

</body>
</html>
