<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>tioumpa.gr</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Inter',sans-serif;
    background:#0b1622;
    color:#e6edf3;
}

/* HEADER */
.header {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 20px;
    border-bottom:1px solid #1f3a52;
    cursor:pointer;
}

/* LAYOUT */
.app {
    display:flex;
    height:calc(100vh - 60px);
}

.sidebar {
    width:320px;
    border-right:1px solid #1f3a52;
    overflow:auto;
    padding:15px;
}

.content {
    flex:1;
    padding:30px;
    overflow:auto;
}

/* SEARCH */
.search-wrapper {
    position:relative;
    display:flex;
    justify-content:center;
    margin-top:20px;
}

.search-wrapper input {
    width:60%;
    padding:12px 40px;
    border-radius:12px;
    border:none;
    background:#12263a;
    color:white;
    font-family:Helvetica, Arial;
    transition:0.3s;
}

.search-wrapper input:focus {
    width:65%;
}

.search-icon {
    position:absolute;
    left:calc(20% + 10px);
    top:50%;
    transform:translateY(-50%);
    width:16px;
    filter:invert(1);
}

.mic {
    position:absolute;
    right:calc(20% + 10px);
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

/* LETTER */
.letter {
    margin-top:15px;
    font-weight:600;
    border-bottom:1px solid #2a445c;
}

/* WORD */
.word {
    padding:10px;
    cursor:pointer;
}
.word:hover {
    background:#1b344a;
}

/* HOME */
.home {
    text-align:center;
    margin-top:40px;
}

.subtitle {
    font-size:14px;
    color:#8aa4bf;
}

.email {
    font-size:12px;
    margin-top:5px;
    color:#6f8aa5;
}

/* BUBBLES */
.bubbles {
    margin-top:20px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.bubble {
    padding:10px 15px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    animation:move 6s linear forwards;
}

@keyframes move {
    0% {transform:translate(0,0);}
    25% {transform:translate(20px,-10px);}
    50% {transform:translate(-15px,15px);}
    75% {transform:translate(10px,5px);}
    100% {transform:translate(0,0); opacity:0;}
}

/* ENTRY */
.entry-title {
    font-size:30px;
    font-style:italic;
    animation:fade 0.4s;
}

.entry-divider {
    height:1px;
    background:#2a445c;
    margin:10px 0 20px;
}

.entry-body {
    white-space:pre-wrap;
    line-height:1.8;
}

.entry-container {
    display:flex;
    gap:20px;
}

.entry-text {
    flex:2;
}

.entry-img {
    flex:1;
}

.entry-img img {
    width:100%;
    border-radius:10px;
}

iframe {
    margin-top:20px;
    width:100%;
}

@keyframes fade {
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1;}
}

/* MOBILE */
@media(max-width:800px){
    .app {flex-direction:column;}
    .sidebar {width:100%; height:200px;}
    .entry-container {flex-direction:column;}
}
</style>
</head>

<body>

<div class="header" onclick="goHome()">
<img src="https://i.ibb.co/ZRJ23fvR/kranoumpanoumpanoumpa.png" height="40">
<strong>tioumpa.gr</strong>
</div>

<div class="app">

<div class="sidebar">
<div id="list"></div>
</div>

<div class="content" id="content"></div>

</div>

<script>

let entries=[];

fetch("data.txt")
.then(r=>r.text())
.then(text=>{
    entries = text.split(/\n(?=Ατάκα)/g).map(e=>{
        const title = e.split("\n")[0].replace(/Ατάκα[0-9]+:\s*/,"").trim();
        return {title,full:e};
    });

    renderList();
    route();
    bubbleLoop();
});

/* ROUTER */
window.addEventListener("hashchange",route);

function route(){
    let name=decodeURIComponent(location.hash.replace("#",""));
    if(!name) return showHome();

    let entry=entries.find(e=>e.title===name);
    if(entry) openEntry(entry);
}

/* LIST */
function renderList(){
    let sorted=[...entries].sort((a,b)=>a.title.localeCompare(b.title,'el'));

    const list=document.getElementById("list");
    list.innerHTML="";

    let current="";

    sorted.forEach(item=>{
        let l=item.title[0].toUpperCase();

        if(l!==current){
            current=l;
            let div=document.createElement("div");
            div.className="letter";
            div.innerText=l;
            list.appendChild(div);
        }

        let w=document.createElement("div");
        w.className="word";
        w.innerText=item.title;
        w.onclick=()=>location.hash=item.title;

        list.appendChild(w);
    });
}

/* HOME */
function showHome(){
    document.getElementById("content").innerHTML = `
        <div class="home">
            <img src="https://i.ibb.co/ZRJ23fvR/kranoumpanoumpanoumpa.png">
            <h2>tioumpa.gr</h2>
            <div class="subtitle">ΤΟ ΛΕΞΙΚΟ ΤΟΥ TEOSTY</div>
            <div class="email">tioumpa@gmail.com</div>

            <div class="search-wrapper">
                <img class="search-icon" src="https://uxwing.com/wp-content/themes/uxwing/download/user-interface/search-icon.png">
                <input id="searchMain" placeholder="Αναζήτηση...">
                <span class="mic" onclick="voice()">🎤</span>
            </div>

            <div style="margin-top:15px; font-size:13px;">τυχαιες λεξεις</div>
            <div class="bubbles" id="bubbles"></div>
        </div>
    `;

    document.getElementById("searchMain").addEventListener("input",e=>{
        filter(e.target.value);
    });
}

/* FILTER */
function filter(q){
    q=q.toLowerCase();
    document.querySelectorAll(".word").forEach(el=>{
        el.style.display = el.innerText.toLowerCase().includes(q) ? "block":"none";
    });
}

/* BUBBLES */
function bubbleLoop(){
    setInterval(()=>{
        const c=document.getElementById("bubbles");
        if(!c) return;
        c.innerHTML="";

        for(let i=0;i<6;i++){
            let w=entries[Math.floor(Math.random()*entries.length)].title;
            let div=document.createElement("div");
            div.className="bubble";
            div.innerText=w;
            c.appendChild(div);
        }

    },6000);
}

/* ENTRY */
function openEntry(entry){

    let lines=entry.full.split("\n");
    lines.shift();

    let clean=lines.join("\n").replace("Περιγραφή:","");

    let imgMatch=clean.match(/https?:\/\/.*\.(jpg|png|jpeg|gif)/);
    let imgHTML = imgMatch ? `<img src="${imgMatch[0]}">` : "";

    document.getElementById("content").innerHTML=`
        <div class="entry-title">${entry.title}</div>
        <div class="entry-divider"></div>

        <div class="entry-container">
            <div class="entry-text">${clean}</div>
            <div class="entry-img">${imgHTML}</div>
        </div>
    `;
}

/* VOICE */
function voice(){
    const r=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
    r.lang="el-GR";
    r.onresult=e=>{
        document.getElementById("searchMain").value=e.results[0][0].transcript;
        filter(e.results[0][0].transcript);
    };
    r.start();
}

/* BACK */
function goHome(){
    location.hash="";
    showHome();
}

</script>

</body>
</html>
