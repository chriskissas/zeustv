<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M3U8 TV Playlist Builder</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card2: #1f2937;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: #334155;
      --blue: #38bdf8;
      --green: #34d399;
      --red: #fb7185;
      --yellow: #fbbf24;
      --purple: #c084fc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: var(--text);
    }

    header {
      padding: 22px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.92);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(8px);
    }

    h1 { margin: 0 0 6px; font-size: 26px; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    p { margin: 0; color: var(--muted); }

    main {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      padding: 16px;
    }

    .panel, .wide-panel {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 18px 42px rgba(0,0,0,0.24);
    }

    .wide-panel {
      grid-column: 1 / -1;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .badge {
      padding: 5px 9px;
      border-radius: 999px;
      color: #020617;
      font-weight: bold;
      font-size: 12px;
    }

    .badge-show { background: var(--green); }
    .badge-ident { background: var(--blue); }
    .badge-ad { background: var(--yellow); }

    label {
      display: block;
      margin: 10px 0 6px;
      color: var(--muted);
      font-size: 13px;
    }

    input, textarea, select, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #020617;
      color: var(--text);
      padding: 10px;
      font-size: 14px;
      outline: none;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }

    button {
      background: var(--blue);
      color: #001018;
      border: 0;
      cursor: pointer;
      font-weight: bold;
      transition: 0.12s ease;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.99); }

    .green { background: var(--green); color: #052e1c; }
    .yellow { background: var(--yellow); color: #3b2500; }
    .purple { background: var(--purple); color: #210333; }
    .red { background: var(--red); color: #fff; }
    .gray { background: #334155; color: var(--text); }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .grid3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .btnrow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .item-list {
      margin-top: 12px;
      display: grid;
      gap: 8px;
      max-height: 260px;
      overflow: auto;
      padding-right: 4px;
    }

    .video-item {
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
    }

    .video-item strong {
      display: block;
      margin-bottom: 5px;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      word-break: break-all;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
    }

    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      color: var(--muted);
      background: #020617;
    }

    tr:hover td {
      background: rgba(56,189,248,0.04);
    }

    .type-pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      color: #020617;
      font-weight: bold;
      font-size: 12px;
    }

    .type-show { background: var(--green); }
    .type-ident { background: var(--blue); }
    .type-ad { background: var(--yellow); }

    .actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .actions button {
      width: auto;
      padding: 7px 9px;
      font-size: 12px;
      border-radius: 9px;
    }

    .preview {
      white-space: pre-wrap;
      font-family: Consolas, monospace;
      font-size: 12px;
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      max-height: 280px;
      overflow: auto;
      color: #dbeafe;
    }

    .settings-row {
      display: grid;
      grid-template-columns: 160px 160px 160px 1fr;
      gap: 10px;
      align-items: end;
      margin-bottom: 14px;
    }

    @media (max-width: 1100px) {
      main { grid-template-columns: 1fr; }
      .settings-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>M3U8 TV Playlist Builder</h1>
    <p>Βάλε βίντεο σε τρία πανελάκια: Εκπομπές, Ident, Διαφημίσεις. Το πρόγραμμα υπολογίζει τις ώρες και κάνει export σε M3U8.</p>
  </header>

  <main>
    <section class="panel">
      <div class="panel-title">
        <h2>ΕΚΠΟΜΠΗ</h2>
        <span class="badge badge-show">SHOW</span>
      </div>

      <label>Τίτλος εκπομπής</label>
      <input id="showTitle" placeholder="π.χ. Πρωινή Εκπομπή" />

      <label>Βίντεο / URL / m3u8</label>
      <input id="showUrl" placeholder="π.χ. https://site.com/show01.m3u8" />

      <div class="grid2">
        <div>
          <label>Διάρκεια</label>
          <input id="showDuration" type="number" min="1" value="30" />
        </div>
        <div>
          <label>Μονάδα</label>
          <select id="showUnit">
            <option value="minutes">λεπτά</option>
            <option value="seconds">δευτερόλεπτα</option>
          </select>
        </div>
      </div>

      <button class="green" style="margin-top:12px;" onclick="addVideo('show')">Προσθήκη Εκπομπής</button>
      <div id="showList" class="item-list"></div>
    </section>

    <section class="panel">
      <div class="panel-title">
        <h2>IDENT</h2>
        <span class="badge badge-ident">CHANNEL IDENT</span>
      </div>

      <label>Τίτλος ident</label>
      <input id="identTitle" placeholder="π.χ. Ident Καναλιού" value="Ident Καναλιού" />

      <label>Βίντεο / URL / m3u8</label>
      <input id="identUrl" placeholder="π.χ. https://site.com/ident.mp4" />

      <div class="grid2">
        <div>
          <label>Διάρκεια</label>
          <input id="identDuration" type="number" min="1" value="10" />
        </div>
        <div>
          <label>Μονάδα</label>
          <select id="identUnit">
            <option value="seconds">δευτερόλεπτα</option>
            <option value="minutes">λεπτά</option>
          </select>
        </div>
      </div>

      <button style="margin-top:12px;" onclick="addVideo('ident')">Προσθήκη Ident</button>
      <div id="identList" class="item-list"></div>
    </section>

    <section class="panel">
      <div class="panel-title">
        <h2>ΔΙΑΦΗΜΙΣΗ</h2>
        <span class="badge badge-ad">ADS</span>
      </div>

      <label>Τίτλος διαφήμισης</label>
      <input id="adTitle" placeholder="π.χ. Διαφήμιση 1" />

      <label>Βίντεο / URL / m3u8</label>
      <input id="adUrl" placeholder="π.χ. https://site.com/ad01.mp4" />

      <div class="grid2">
        <div>
          <label>Διάρκεια</label>
          <input id="adDuration" type="number" min="1" value="30" />
        </div>
        <div>
          <label>Μονάδα</label>
          <select id="adUnit">
            <option value="seconds">δευτερόλεπτα</option>
            <option value="minutes">λεπτά</option>
          </select>
        </div>
      </div>

      <button class="yellow" style="margin-top:12px;" onclick="addVideo('ad')">Προσθήκη Διαφήμισης</button>
      <div id="adList" class="item-list"></div>
    </section>

    <section class="wide-panel">
      <h2>Ρυθμίσεις προγράμματος</h2>
      <div class="settings-row">
        <div>
          <label>Ώρα έναρξης</label>
          <input id="startTime" type="time" value="15:00" onchange="renderAll()" />
        </div>
        <div>
          <label>Ident πριν από εκπομπή</label>
          <select id="identBefore" onchange="renderAll()">
            <option value="yes">Ναι</option>
            <option value="no">Όχι</option>
          </select>
        </div>
        <div>
          <label>Ident μετά από εκπομπή</label>
          <select id="identAfter" onchange="renderAll()">
            <option value="yes">Ναι</option>
            <option value="no">Όχι</option>
          </select>
        </div>
        <div>
          <label>Σειρά παιξίματος</label>
          <select id="playMode" onchange="renderAll()">
            <option value="show-ident-ad">Εκπομπή + Ident + Διαφήμιση</option>
            <option value="ident-show-ad-ident">Ident + Εκπομπή + Διαφήμιση + Ident</option>
            <option value="show-only-with-ident">Μόνο Εκπομπές με Ident πριν/μετά</option>
          </select>
        </div>
      </div>

      <div class="btnrow">
        <button class="purple" onclick="downloadM3U8()">Εξαγωγή M3U8</button>
        <button class="red" onclick="clearAll()">Καθαρισμός Όλων</button>
      </div>
    </section>

    <section class="wide-panel">
      <h2>Τι ώρα θα παίξει</h2>
      <table>
        <thead>
          <tr>
            <th>Ώρα</th>
            <th>Κατηγορία</th>
            <th>Τίτλος</th>
            <th>Διάρκεια</th>
            <th>Βίντεο / URL</th>
          </tr>
        </thead>
        <tbody id="timelineBody"></tbody>
      </table>
    </section>

    <section class="wide-panel">
      <h2>Preview M3U8</h2>
      <div id="m3uPreview" class="preview"></div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "simple_m3u8_tv_builder_v1";

    let state = loadState();

    function defaultState() {
      return {
        show: [],
        ident: [],
        ad: [],
        settings: {
          startTime: "15:00",
          identBefore: "yes",
          identAfter: "yes",
          playMode: "ident-show-ad-ident"
        }
      };
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultState();
      } catch {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function getFields(type) {
      if (type === "show") {
        return {
          title: document.getElementById("showTitle"),
          url: document.getElementById("showUrl"),
          duration: document.getElementById("showDuration"),
          unit: document.getElementById("showUnit")
        };
      }
      if (type === "ident") {
        return {
          title: document.getElementById("identTitle"),
          url: document.getElementById("identUrl"),
          duration: document.getElementById("identDuration"),
          unit: document.getElementById("identUnit")
        };
      }
      return {
        title: document.getElementById("adTitle"),
        url: document.getElementById("adUrl"),
        duration: document.getElementById("adDuration"),
        unit: document.getElementById("adUnit")
      };
    }

    function addVideo(type) {
      const fields = getFields(type);
      const title = fields.title.value.trim();
      const url = fields.url.value.trim();
      const duration = Number(fields.duration.value);
      const unit = fields.unit.value;

      if (!title) {
        alert("Βάλε τίτλο.");
        return;
      }

      if (!url) {
        alert("Βάλε βίντεο / URL / m3u8.");
        return;
      }

      if (!duration || duration <= 0) {
        alert("Βάλε σωστή διάρκεια.");
        return;
      }

      state[type].push({ id: uid(), type, title, url, duration, unit });
      saveState();

      if (type !== "ident") fields.title.value = "";
      fields.url.value = "";

      renderAll();
    }

    function deleteVideo(type, id) {
      state[type] = state[type].filter(item => item.id !== id);
      saveState();
      renderAll();
    }

    function moveVideo(type, id, direction) {
      const list = state[type];
      const index = list.findIndex(item => item.id === id);
      if (index < 0) return;

      const newIndex = index + direction;
      if (newIndex < 0 || newIndex >= list.length) return;

      [list[index], list[newIndex]] = [list[newIndex], list[index]];
      saveState();
      renderAll();
    }

    function durationSeconds(item) {
      return item.unit === "minutes" ? Number(item.duration) * 60 : Number(item.duration);
    }

    function secondsToLabel(seconds) {
      if (seconds < 60) return seconds + " sec";
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return s ? `${m} λεπτά ${s} sec` : `${m} λεπτά`;
    }

    function timeToSeconds(value) {
      const [h, m] = value.split(":").map(Number);
      return h * 3600 + m * 60;
    }

    function secondsToTime(total) {
      total = ((Math.round(total) % 86400) + 86400) % 86400;
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    }

    function getSettingsFromUi() {
      state.settings.startTime = document.getElementById("startTime").value || "15:00";
      state.settings.identBefore = document.getElementById("identBefore").value;
      state.settings.identAfter = document.getElementById("identAfter").value;
      state.settings.playMode = document.getElementById("playMode").value;
      saveState();
    }

    function firstIdent() {
      return state.ident[0] || null;
    }

    function firstAd(index) {
      if (state.ad.length === 0) return null;
      return state.ad[index % state.ad.length];
    }

    function cloneAsScheduleItem(item, forcedType) {
      return {
        sourceId: item.id,
        type: forcedType || item.type,
        title: item.title,
        url: item.url,
        duration: item.duration,
        unit: item.unit,
        seconds: durationSeconds(item)
      };
    }

    function buildTimeline() {
      getSettingsFromUi();

      const timeline = [];
      const ident = firstIdent();
      let adIndex = 0;
      let cursor = timeToSeconds(state.settings.startTime);

      function push(item, typeOverride) {
        if (!item) return;
        const entry = cloneAsScheduleItem(item, typeOverride);
        entry.start = secondsToTime(cursor);
        entry.end = secondsToTime(cursor + entry.seconds);
        timeline.push(entry);
        cursor += entry.seconds;
      }

      state.show.forEach(show => {
        const mode = state.settings.playMode;

        if (mode === "show-ident-ad") {
          push(show, "show");
          push(ident, "ident");
          push(firstAd(adIndex++), "ad");
          return;
        }

        if (mode === "ident-show-ad-ident") {
          push(ident, "ident");
          push(show, "show");
          push(firstAd(adIndex++), "ad");
          push(ident, "ident");
          return;
        }

        if (mode === "show-only-with-ident") {
          if (state.settings.identBefore === "yes") push(ident, "ident");
          push(show, "show");
          if (state.settings.identAfter === "yes") push(ident, "ident");
        }
      });

      return timeline;
    }

    function typeLabel(type) {
      if (type === "show") return "ΕΚΠΟΜΠΗ";
      if (type === "ident") return "IDENT";
      if (type === "ad") return "ΔΙΑΦΗΜΙΣΗ";
      return type;
    }

    function typeClass(type) {
      if (type === "show") return "type-show";
      if (type === "ident") return "type-ident";
      if (type === "ad") return "type-ad";
      return "";
    }

    function renderLists() {
      renderList("show", "showList");
      renderList("ident", "identList");
      renderList("ad", "adList");
    }

    function renderList(type, elementId) {
      const box = document.getElementById(elementId);
      const list = state[type];

      if (!list.length) {
        box.innerHTML = `<div class="small">Δεν έχεις βάλει ακόμα βίντεο.</div>`;
        return;
      }

      box.innerHTML = list.map((item, index) => `
        <div class="video-item">
          <strong>${escapeHtml(item.title)}</strong>
          <div class="small">${escapeHtml(item.url)}</div>
          <div class="small">Διάρκεια: ${secondsToLabel(durationSeconds(item))}</div>
          <div class="actions" style="margin-top:8px;">
            <button class="gray" onclick="moveVideo('${type}', '${item.id}', -1)">↑</button>
            <button class="gray" onclick="moveVideo('${type}', '${item.id}', 1)">↓</button>
            <button class="red" onclick="deleteVideo('${type}', '${item.id}')">Διαγραφή</button>
          </div>
        </div>
      `).join("");
    }

    function renderTimeline() {
      const timeline = buildTimeline();
      const body = document.getElementById("timelineBody");

      if (!timeline.length) {
        body.innerHTML = `<tr><td colspan="5" class="small">Βάλε τουλάχιστον μία εκπομπή για να εμφανιστεί πρόγραμμα.</td></tr>`;
        return;
      }

      body.innerHTML = timeline.map(item => `
        <tr>
          <td><strong>${item.start} - ${item.end}</strong></td>
          <td><span class="type-pill ${typeClass(item.type)}">${typeLabel(item.type)}</span></td>
          <td>${escapeHtml(item.title)}</td>
          <td>${secondsToLabel(item.seconds)}</td>
          <td class="small">${escapeHtml(item.url)}</td>
        </tr>
      `).join("");
    }

    function buildM3U8() {
      const timeline = buildTimeline();
      let output = "#EXTM3U\n";
      output += "#PLAYLIST:Scheduled TV Playlist\n";
      output += "#TIMEZONE:Europe/Athens\n";
      output += `#START:${state.settings.startTime}\n`;
      output += "\n";

      timeline.forEach(item => {
        output += `#EXT-X-PROGRAM-DATETIME:${item.start}\n`;
        output += `#EXTINF:${item.seconds},${item.start} - ${item.end} | ${typeLabel(item.type)} | ${item.title}\n`;
        output += `#TVSCHED:type=${item.type};start=${item.start};end=${item.end};title=${safeAttr(item.title)}\n`;
        output += `${item.url}\n\n`;
      });

      return output;
    }

    function renderPreview() {
      document.getElementById("m3uPreview").textContent = buildM3U8();
    }

    function renderAll() {
      restoreSettingsToState();
      renderLists();
      renderTimeline();
      renderPreview();
    }

    function restoreSettingsToState() {
      const s = state.settings || defaultState().settings;
      document.getElementById("startTime").value = s.startTime || "15:00";
      document.getElementById("identBefore").value = s.identBefore || "yes";
      document.getElementById("identAfter").value = s.identAfter || "yes";
      document.getElementById("playMode").value = s.playMode || "ident-show-ad-ident";
    }

    function downloadM3U8() {
      const content = buildM3U8();
      const blob = new Blob([content], { type: "application/vnd.apple.mpegurl" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "scheduled_playlist.m3u8";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function clearAll() {
      if (!confirm("Να σβηστούν όλα τα βίντεο;")) return;
      state = defaultState();
      saveState();
      renderAll();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function safeAttr(value) {
      return String(value || "").replaceAll(";", ",").replaceAll("\n", " ");
    }

    restoreSettingsToState();
    renderAll();
  </script>
</body>
</html>
